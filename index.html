<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1629" />
    <meta name="description" content="12道题，测出你的阿瓦隆角色人格" />
    <title>阿瓦隆角色人格测试</title>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <div id="app" class="app">
      <!-- 首页 -->
      <section id="screen-home" class="screen screen--active" aria-label="首页">
        <div class="hero-badge" aria-hidden="true"></div>
        <h1 class="title">测测你在阿瓦隆里<span class="title-accent">最像谁</span></h1>
        <p class="subtitle">12 道题，测出你的阿瓦隆角色人格</p>
        <ul class="lead-list">
          <li>你靠逻辑还是直觉判断局势？</li>
          <li>你擅长带队、守局，还是迷惑全场？</li>
          <li>完成测试，生成你的专属角色结果</li>
        </ul>
        <p class="disclaimer">本测试为娱乐向社交博弈风格参考，不代表真实阵营或能力。</p>
        <button type="button" class="btn btn-primary" id="btn-start">开始测试</button>
      </section>

      <!-- 答题 -->
      <section id="screen-quiz" class="screen" aria-label="答题" hidden>
        <div class="quiz-top">
          <span class="progress" id="quiz-progress" aria-live="polite">1 / 12</span>
          <div class="progress-bar" role="progressbar" aria-valuemin="1" aria-valuemax="12" aria-valuenow="1" id="quiz-progressbar">
            <span class="progress-bar__fill" id="quiz-progress-fill"></span>
          </div>
        </div>
        <h2 class="question" id="quiz-question"></h2>
        <div class="options" id="quiz-options"></div>
      </section>

      <!-- 结果 -->
      <section id="screen-result" class="screen" aria-label="测试结果" hidden>
        <div class="result-card">
          <div class="result-badge" id="result-badge" aria-hidden="true"></div>
          <h2 class="result-title" id="result-title"></h2>
          <p class="result-subtitle" id="result-subtitle"></p>
          <div class="tags" id="result-tags"></div>
          <p class="similarity" id="result-similarity"></p>
          <p class="secondary-role" id="result-secondary"></p>
          <section class="block">
            <h3 class="block-title">结果解读</h3>
            <p class="block-text" id="result-body"></p>
          </section>
          <section class="block">
            <h3 class="block-title">你的优势</h3>
            <ul class="bullet-list" id="result-pros"></ul>
          </section>
          <section class="block">
            <h3 class="block-title">你的盲区</h3>
            <ul class="bullet-list" id="result-cons"></ul>
          </section>
          <section class="block block--share">
            <h3 class="block-title">分享短文案</h3>
            <p class="share-text" id="result-share"></p>
          </section>
        </div>
        <div class="actions">
          <button type="button" class="btn btn-primary" id="btn-poster">生成分享图</button>
          <button type="button" class="btn btn-ghost" id="btn-retry">重新测试</button>
        </div>
      </section>

      <!-- 分享海报 -->
      <section id="screen-poster" class="screen screen--poster" aria-label="分享海报" hidden>
        <p class="poster-hint">长按图片保存，或点击下方按钮下载</p>
        <div class="poster-wrap">
          <canvas id="poster-canvas" width="750" height="1200" aria-label="分享海报预览"></canvas>
        </div>
        <div class="actions">
          <button type="button" class="btn btn-primary" id="btn-download">下载图片</button>
          <button type="button" class="btn btn-ghost" id="btn-back-result">返回结果</button>
        </div>
      </section>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
